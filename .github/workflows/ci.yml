name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: dotnet publish Brusca.Api/Brusca.Api.csproj --configuration Release --no-build --output publish

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: brusca-api-publish
          path: publish/
